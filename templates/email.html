<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly AI Digest</title>
</head>
<body style="margin:0;padding:0;background:#0f172a;color:#e2e8f0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#0f172a;padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="640" cellpadding="0" cellspacing="0" style="width:640px;max-width:640px;background:#0f172a;">
          <tr>
            <td style="padding:8px 24px 24px 24px;">

              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-bottom:2px solid #6366f1;padding-bottom:12px;">
                <tr>
                  <td style="font-size:24px;font-weight:bold;color:#e2e8f0;">🔧 Weekly AI Digest</td>
                  <td align="right" style="font-size:14px;color:#818cf8;">$date</td>
                </tr>
              </table>

              <p style="font-size:16px;line-height:1.6;color:#e2e8f0;margin:24px 0;">$intro</p>

              <p style="font-size:13px;color:#6366f1;text-transform:uppercase;letter-spacing:1px;margin:24px 0 4px 0;">Top Highlights</p>
              $highlights

              <p style="font-size:13px;color:#6366f1;text-transform:uppercase;letter-spacing:1px;margin:28px 0 4px 0;">Tip of the Week</p>
              <div style="background:#1e293b;padding:20px;margin:12px 0;border-radius:6px;border-left:3px solid #6366f1;">
                <p style="color:#cbd5e1;margin:0;line-height:1.6;">$tip</p>
              </div>

              <p style="font-size:13px;color:#6366f1;text-transform:uppercase;letter-spacing:1px;margin:28px 0 4px 0;">🎯 Prova questa settimana</p>
              $action_of_the_week

              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-top:1px solid #1e293b;margin-top:32px;">
                <tr>
                  <td align="center" style="padding-top:16px;font-size:12px;color:#64748b;">$article_count articoli processati questa settimana</td>
                </tr>
              </table>

            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
