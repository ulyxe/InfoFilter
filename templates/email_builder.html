<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Builder Digest</title>
</head>
<body style="margin:0;padding:0;background:#0a0f1e;color:#e2e8f0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#0a0f1e;padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="640" cellpadding="0" cellspacing="0" style="width:640px;max-width:640px;background:#0a0f1e;">
          <tr>
            <td style="padding:8px 24px 24px 24px;">

              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-bottom:2px solid #f59e0b;padding-bottom:12px;">
                <tr>
                  <td style="font-size:24px;font-weight:bold;color:#e2e8f0;">💡 Weekly Builder Digest</td>
                  <td align="right" style="font-size:14px;color:#fbbf24;">$date</td>
                </tr>
              </table>

              <p style="font-size:16px;line-height:1.6;color:#e2e8f0;margin:24px 0;">$intro</p>

              <p style="font-size:13px;color:#f59e0b;text-transform:uppercase;letter-spacing:1px;margin:24px 0 4px 0;">💼 Idee di business</p>
              $business_ideas

              <p style="font-size:13px;color:#10b981;text-transform:uppercase;letter-spacing:1px;margin:28px 0 4px 0;">🤖 Pattern agentivo</p>
              $agentic_pattern

              <p style="font-size:13px;color:#f59e0b;text-transform:uppercase;letter-spacing:1px;margin:28px 0 4px 0;">📖 Caso studio</p>
              $case_study

              <p style="font-size:13px;color:#f59e0b;text-transform:uppercase;letter-spacing:1px;margin:28px 0 4px 0;">🎯 Tip strategico</p>
              <div style="background:#111827;padding:20px;margin:12px 0;border-radius:6px;border-left:3px solid #f59e0b;">
                <p style="color:#cbd5e1;margin:0;line-height:1.6;">$tip</p>
              </div>

              <p style="font-size:13px;color:#f59e0b;text-transform:uppercase;letter-spacing:1px;margin:28px 0 4px 0;">🎯 Prova questa settimana</p>
              $action_of_the_week

              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-top:1px solid #111827;margin-top:32px;">
                <tr>
                  <td align="center" style="padding-top:16px;font-size:12px;color:#64748b;">$article_count fonti analizzate | 🇮🇹 → 🌍</td>
                </tr>
              </table>

            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
